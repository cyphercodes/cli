name: Sync Firecrawl Skill

on:
  push:
    branches: [main]
    paths:
      - 'skills/firecrawl-cli/**'
  workflow_dispatch:

jobs:
  sync_cursor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CLI repo
        uses: actions/checkout@v4
        with:
          path: cli

      - name: Clone target repo
        env:
          TOKEN: ${{ secrets.FIRECRAWL_SKILLS_SYNC }}
        run: |
          git clone https://x-access-token:${TOKEN}@github.com/firecrawl/firecrawl-cursor-plugin.git cursor 2>/dev/null || {
            mkdir cursor && cd cursor && git init
            git remote add origin https://x-access-token:${TOKEN}@github.com/firecrawl/firecrawl-cursor-plugin.git
          }

      - name: Sync to Cursor plugin
        env:
          GH_TOKEN: ${{ secrets.FIRECRAWL_SKILLS_SYNC }}
        run: |
          cd cursor
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          rm -rf skills/firecrawl
          mkdir -p skills/firecrawl
          cp -R ../cli/skills/firecrawl-cli/. skills/firecrawl/

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi

          SHORT_SHA="${GITHUB_SHA:0:7}"
          COMMIT_URL="https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"

          if ! git rev-parse HEAD >/dev/null 2>&1; then
            git checkout -b main
            git commit -m "sync firecrawl skill from firecrawl/cli (${SHORT_SHA})"
            git push origin main
          else
            BRANCH="sync/cursor-skill-${SHORT_SHA}"
            git checkout -b "$BRANCH"
            git commit -m "sync firecrawl skill from firecrawl/cli (${SHORT_SHA})"
            git push origin "$BRANCH"
            PR_URL=$(gh pr create \
              --repo firecrawl/firecrawl-cursor-plugin \
              --title "sync firecrawl skill (${SHORT_SHA})" \
              --body "Automated sync of \`skills/firecrawl-cli\` from [firecrawl/cli@${SHORT_SHA}](${COMMIT_URL}) into \`skills/firecrawl\`." \
              --base main \
              --head "$BRANCH")
            echo "Created PR: $PR_URL"
            gh pr merge --repo firecrawl/firecrawl-cursor-plugin --auto --merge --delete-branch "$PR_URL"
          fi

  sync_claude:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CLI repo
        uses: actions/checkout@v4
        with:
          path: cli

      - name: Clone Claude plugin repo
        env:
          TOKEN: ${{ secrets.FIRECRAWL_SKILLS_SYNC }}
        run: |
          git clone https://x-access-token:${TOKEN}@github.com/firecrawl/firecrawl-claude-plugin.git claude 2>/dev/null || {
            mkdir claude && cd claude && git init
            git remote add origin https://x-access-token:${TOKEN}@github.com/firecrawl/firecrawl-claude-plugin.git
          }

      - name: Sync to Claude plugin
        env:
          GH_TOKEN: ${{ secrets.FIRECRAWL_SKILLS_SYNC }}
        run: |
          cd claude
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          rm -rf skills/firecrawl-cli
          mkdir -p skills/firecrawl-cli
          cp -R ../cli/skills/firecrawl-cli/. skills/firecrawl-cli/

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi

          SHORT_SHA="${GITHUB_SHA:0:7}"
          COMMIT_URL="https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"

          if ! git rev-parse HEAD >/dev/null 2>&1; then
            git checkout -b main
            git commit -m "sync firecrawl skill from firecrawl/cli (${SHORT_SHA})"
            git push origin main
          else
            BRANCH="sync/claude-skill-${SHORT_SHA}"
            git checkout -b "$BRANCH"
            git commit -m "sync firecrawl skill from firecrawl/cli (${SHORT_SHA})"
            git push origin "$BRANCH"
            PR_URL=$(gh pr create \
              --repo firecrawl/firecrawl-claude-plugin \
              --title "sync firecrawl skill (${SHORT_SHA})" \
              --body "Automated sync of \`skills/firecrawl-cli\` from [firecrawl/cli@${SHORT_SHA}](${COMMIT_URL}) into \`skills/firecrawl-cli\`." \
              --base main \
              --head "$BRANCH")
            echo "Created PR: $PR_URL"
            gh pr merge --repo firecrawl/firecrawl-claude-plugin --auto --merge --delete-branch "$PR_URL"
          fi
